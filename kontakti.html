<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - PC review</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Сборка компьютеров под ключ в Алексеевке. Игровые и рабочие ПК. Индивидуальный подбор. Гарантия 12 месяцев.">
    <meta name="keywords" content="сборка пк, компьютер, игровой пк, алексеевка, компьютерный магазин">
    <meta name="author" content="PC review">
</head>
<body>

      <div class="header">
         <a href="index.html" class="logo">PC review!</a>
            <div class="nav-links">
               <a href="index.html">Главная</a>
               <a href="katalog.html">Каталог</a>
               <a href="kontakti.html">Контакты</a>
            </div>
       </div>

    <!-- Заголовок страницы -->
    <div class="page-title">
        <h1>Свяжитесь с нами</h1>
        <p>Оставьте заявку, и мы подберем идеальный ПК</p>
    </div>

    <!-- Форма обратной связи -->
    <div class="contact-form">
        <h2>Форма заявки</h2>
        
        <form id="tgForm">
            
            <div class="form-group">
                <label>Ваше имя:</label>
                <input type="text" id="name" name="name" placeholder="Введите ваше имя" required>
            </div>
            
            <div class="form-group">
                <label>Телефон:</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (___) ___-__-__" required>
            </div>
            
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" name="email" placeholder="example@mail.ru">
            </div>
            
            <div class="form-group">
                <label>Интересует сборка:</label>
                <select id="build" name="build">
                    <option value="Starter">Игровая сборка "Starter" (97 000 ₽)</option>
                    <option value="Gamer Pro">Игровая сборка "Gamer Pro" (147 000 ₽)</option>
                    <option value="Ultimate">Игровая сборка "Ultimate" (287 000 ₽)</option>
                    <option value="custom">Собственная сборка</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Ваш вопрос:</label>
                <textarea id="message" name="message" rows="5" placeholder="Опишите, какой компьютер вам нужен..."></textarea>
            </div>
            
            <div class="form-group checkbox-group">
               <label class="checkbox-label">
                  <input type="checkbox" id="agreement" required>
                   Я согласен на <a href="privacy.html" target="_blank">обработку персональных данных</a>
               </label>
            </div> 

            <button type="submit" class="submit-btn" id="submitBtn">Отправить заявку</button>
            
        </form>
        
        <!-- Блок для сообщения об успехе/ошибке -->
        <div id="formStatus" style="margin-top: 20px; text-align: center;"></div>
    </div>

    <!-- Контактная информация -->
    <div class="contact-info">
        <h3>Наши контакты</h3>
        <p>📞 Телефон: +7 (952) 430-79-76</p>
        <p>✉️ Email: <a href="mailto:pc-review@gmail.com">pc-review@gmail.com</a></p>
        <p>📍 Адрес: г. Алексеевка, 1-ый пер. Мостовой, 2Б</p>
        <p>⏰ Режим работы: Пн-Пт 9:00 - 21:00</p>
    </div>

       <script>
    const form = document.getElementById('tgForm');
    const statusDiv = document.getElementById('formStatus');
    const submitBtn = document.getElementById('submitBtn');
    
    // ⚠️ ВАЖНО: замените на ваш реальный адрес на Render.com
    const BACKEND_URL = 'https://pc-review-backend.onrender.com';
    
    form.addEventListener('submit', async function(event) {
        event.preventDefault();
        
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const build = document.getElementById('build').value;
        const message = document.getElementById('message').value.trim();
        const agreement = document.getElementById('agreement').checked;
        
        if (!name || !phone) {
            statusDiv.innerHTML = '<p style="color: #dc2626;">❌ Пожалуйста, заполните имя и телефон</p>';
            return;
        }
        
        if (!agreement) {
            statusDiv.innerHTML = '<p style="color: #dc2626;">❌ Подтвердите согласие на обработку данных</p>';
            return;
        }
        
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.7';
        submitBtn.textContent = '⏳ Отправка...';
        statusDiv.innerHTML = '<p style="color: #00d2ff;">⏳ Отправляем заявку...</p>';
        
        try {
            const response = await fetch(`${BACKEND_URL}/api/submit-order`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, email, build, message })
            });
            
            const result = await response.json();
            
            if (response.ok && result.success) {
                statusDiv.innerHTML = '<p style="color: #10b981;">✅ Заявка отправлена! Мы свяжемся с вами в ВК.</p>';
                form.reset();
            } else {
                throw new Error(result.error || 'Ошибка сервера');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            statusDiv.innerHTML = '<p style="color: #dc2626;">❌ Не удалось отправить заявку. Позвоните нам: +7 (952) 430-79-76</p>';
        } finally {
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            submitBtn.textContent = 'Отправить заявку';
            
            setTimeout(() => {
                if (statusDiv.innerHTML.includes('✅') || statusDiv.innerHTML.includes('❌')) {
                    statusDiv.innerHTML = '';
                }
            }, 5000);
        }
    });
</script>

    <script>
    // Автоматически подстраиваем отступ под высоту шапки
    function adjustHeaderOffset() {
        const headerHeight = document.querySelector('.header').offsetHeight;
        document.body.style.paddingTop = headerHeight + 'px';
    }
    window.addEventListener('load', adjustHeaderOffset);
    window.addEventListener('resize', adjustHeaderOffset);
</script>
    <script>
    // Плавное появление элементов при скролле
    const animatedElements = document.querySelectorAll('.feature-card, .card, .contact-form, .contact-info');
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                observer.unobserve(entry.target); // отключаем наблюдение после появления
            }
        });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
    
    animatedElements.forEach(el => observer.observe(el));
</script>
</body>
</html>
